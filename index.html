<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seminario Teológico Digital</title>
    
    <!-- PWA Manifest & Theme Color -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#FFFFFF" />
    
    <!-- iOS / Apple Web App Touch capability & styles -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Seminario" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then((reg) => {
              console.log('Service Worker registrado con éxito en el ámbito:', reg.scope);
            })
            .catch((err) => {
              console.error('Error al registrar el Service Worker:', err);
            });
        });
      }
    </script>
  </body>
</html>
